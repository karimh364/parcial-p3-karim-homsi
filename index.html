<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parcial Programación 3</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="loading" class="oculto">Cargando...</div>

    <main class="contenedor">
        <section class="tarjeta">
            <h2>Registro</h2>
            <form id="form-registro">
                <div class="grupo">
                    <label>Nombre y Apellido</label>
                    <input type="text" id="reg-nombre">
                    <span id="error-nombre" class="error"></span>
                </div>
                <div class="grupo">
                    <label>Email</label>
                    <input type="email" id="reg-email">
                    <span id="error-email" class="error"></span>
                </div>
                <div class="grupo">
                    <label>Contraseña</label>
                    <input type="password" id="reg-pass">
                    <span id="error-pass" class="error"></span>
                </div>
                <div class="grupo">
                    <label>Confirmar Contraseña</label>
                    <input type="password" id="reg-pass2">
                    <span id="error-pass2" class="error"></span>
                </div>
                <div class="grupo">
                    <label>Fecha de Nacimiento</label>
                    <input type="date" id="reg-fecha">
                    <span id="error-fecha" class="error"></span>
                </div>
                <div class="grupo-check">
                    <input type="checkbox" id="reg-terminos">
                    <label>Acepto términos y condiciones</label>
                    <span id="error-terminos" class="error d-block"></span>
                </div>
                <button type="submit">Registrarse</button>
                <p id="mensaje-registro" class="mensaje"></p>
            </form>
        </section>

        <section class="tarjeta">
            <h2>Login</h2>
            <form id="form-login">
                <div class="grupo">
                    <label>Email</label>
                    <input type="email" id="log-email">
                </div>
                <div class="grupo">
                    <label>Contraseña</label>
                    <input type="password" id="log-pass">
                </div>
                <button type="submit">Ingresar</button>
                <p id="mensaje-login" class="mensaje"></p>
            </form>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
